# .github/dependabot.yml — frontend-monorepo
#
# Dependabot keeps npm and GitHub Actions dependencies up-to-date.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm — root workspace and all sub-packages
  # ---------------------------------------------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    groups:
      # Group all patch/minor updates into one PR per ecosystem.
      npm-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels:
      - dependencies
      - javascript
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Ignore major version bumps for these — they require manual review.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "turbo"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # GitHub Actions
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
