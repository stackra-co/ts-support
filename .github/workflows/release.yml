# .github/workflows/release.yml — frontend-monorepo
#
# Creates a GitHub Release when a version tag v* is pushed.
# Publishes any public packages in packages/ to npm.
#
# Tag format: v<semver>  (e.g. v1.0.0)
# Per-package tag: <package>-v<semver>  (e.g. ui-v1.2.0)
#
# Required secrets:
#   NPM_TOKEN — from https://www.npmjs.com (for publishing packages)

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "*-v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Point npm to the registry for publishing.
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish public packages to npm.
      # Only runs if NPM_TOKEN secret is set.
      - name: Publish to npm
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          for dir in packages/*/; do
            PRIVATE=$(node -e "const p=require('./$dir/package.json'); console.log(p.private || false)")
            if [ "$PRIVATE" = "false" ]; then
              echo "Publishing $dir"
              npm publish "./$dir" --access public
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
