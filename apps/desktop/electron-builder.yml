# electron-builder Configuration
#
# Bundles the Electron main/preload + the built Vite app into
# distributable packages for macOS, Windows, and Linux.

appId: com.pixielity.desktop
productName: Pixielity
copyright: Copyright © 2025 Abdelrhman Kouta

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - renderer/**/*

extraResources:
  - from: ../vite/dist
    to: renderer

mac:
  target: [dmg, zip]
  artifactName: ${productName}-${version}-${arch}.${ext}
  category: public.app-category.business

win:
  target: [nsis]
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target: [AppImage, deb]
  artifactName: ${productName}-${version}.${ext}
  category: Office
